services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    volumes:
      - .:/app
      - workspace-node-modules:/app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_started

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      API_PORT: 4000
      DATABASE_URL: postgresql://balancesphere:balancesphere@postgres:5432/balancesphere
      REDIS_URL: redis://redis:6379
    volumes:
      - .:/app
      - workspace-node-modules:/app/node_modules
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      DATABASE_URL: postgresql://balancesphere:balancesphere@postgres:5432/balancesphere
      REDIS_URL: redis://redis:6379
      WORKER_HEARTBEAT_MS: 15000
    volumes:
      - .:/app
      - workspace-node-modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: balancesphere
      POSTGRES_PASSWORD: balancesphere
      POSTGRES_DB: balancesphere
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U balancesphere -d balancesphere"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  workspace-node-modules: